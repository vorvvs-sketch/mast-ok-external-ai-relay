services:
  - type: web
    name: mast-ok-external-ai-relay
    runtime: docker
    plan: starter
    autoDeploy: true
    dockerContext: ./external-ai-relay
    dockerfilePath: ./Dockerfile
    envVars:
      - key: AI_MODEL
        value: gpt-4.1-mini
      - key: AI_API_URL
        value: https://api.openai.com/v1/chat/completions
      - key: AI_TIMEOUT
        value: "30"
      - key: MAX_UPLOAD_MB
        value: "8"
      - key: AI_API_KEY
        sync: false
