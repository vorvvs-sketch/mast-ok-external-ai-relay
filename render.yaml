services:
  - type: web
    name: mast-ok-external-ai-relay
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AI_MODEL
        value: gpt-5-mini
      - key: AI_API_URL
        value: https://api.openai.com/v1/chat/completions
      - key: AI_TIMEOUT
        value: "30"
      - key: MAX_UPLOAD_MB
        value: "20"
      - key: CATALOG_PATH
        value: ./catalog.json
      - key: OPENAI_API_KEY
        sync: false
